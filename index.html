<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐱날 알아가는 시간 날아가자</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/static/pretendard.css" rel="stylesheet">
</head>
<body>
  <div id="loading" class="loading-screen">
    <img id="loadingGif" src="img/loading.gif" alt="로딩 중" style="width:60px;height:60px;display:block;margin:0 auto 10px auto;">
    <div class="loading-text">날 알아 가는 중...</div>
  </div>
  <header class="site-header">
    <img src="img/logo_naragaja.png" alt="날아가자 로고" class="site-logo">
    <p class="site-subtitle">오늘도 테스트로 날 알아가자 ✦</p>
  </header>

  <section class="main-banner">
    <div class="banner-title">
      <img src="img/logo_naragaja.png" alt="메인로고" class="banner-logo">
      <span class="banner-title-text">쫄부월드</span>
    </div>
    <h2 class="banner-desc">감성 테스트 시작해볼까요?</h2>
    <button class="view-all-btn">전체보기</button>
  </section>

  <section class="recommend-section">
    <div class="recommend-title">이주의 추천 테스트</div>
    <div class="recommend-card">
      <img src="img/testo_vs_egen_thumb.png" alt="테토 vs 에겐 썸네일" class="recommend-thumb">
      <div class="recommend-info">
        <div class="recommend-desc">테토 vs 에겐 테스트</div>
        <button class="recommend-btn" onclick="showLoadingAndGo('tests/testo-egen/')">테스트하기</button>
      </div>
    </div>
  </section>

  <section class="popular-section">
    <div class="popular-title">인기 테스트 TOP 3</div>
    <ol class="popular-list" id="popularList">
      <!-- JS로 인기 테스트 3개 자동 삽입 -->
    </ol>
  </section>

  <section class="hashtag-section">
    <span class="hashtag">#고양이</span>
    <span class="hashtag">#산리오</span>
    <span class="hashtag">#연애</span>
    <span class="hashtag">#MBTI</span>
  </section>

  <main id="testList" class="card-container">
    <!-- 카드 목록 자동 삽입 -->
  </main>

  <script src="script.js"></script>
  <script>
function showLoadingAndGo(url) {
  const loading = document.getElementById('loading');
  if (loading) loading.style.display = 'flex';
  setTimeout(function() {
    location.href = url;
  }, 500);
}
</script>
</body>
</html>
