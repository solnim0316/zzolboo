<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>만약 내가 공룡시대에 태어났다면?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="start">
    <h1>성격유형별 공룡 테스트 </h1>
    <p>나는 어떤 공룡이였을까? </p>
    <input id="nameInput" type="text" placeholder="이름을 입력하세요" style="margin:10px auto 10px auto;display:block;width:80%;max-width:300px;text-align:center;">
    <button id="startBtn">테스트 시작하기</button>
  </div>

  <div class="question" style="display:none;">
    <div class="progress"><div class="progress-bar"></div></div>
    <h3 id="qText"></h3>
    <ul id="optList"></ul>
  </div>

<div class="result" style="display:none;">
  <img id="rImg" />
  <h2 id="rTitle"></h2>
  <p id="rDesc"></p>
  <p id="rMatch"></p>
  <p id="rMismatch"></p>

  <button onclick="goHome()">처음으로</button>
  <button onclick="restartTest()">다시 하기</button>
  <button onclick="openShareModal()">공유하기</button>
  <button onclick="downloadImage()">이미지 저장</button>
</div>

<div id="shareModal" class="share-modal" style="display:none;">
  <div class="share-modal-content">
    <span id="closeShareModal" class="share-modal-close">&times;</span>
    <h3>퀴즈 결과 공유하기</h3>
    <div class="share-preview">
      <img id="shareImg" style="width:60px;height:60px;object-fit:cover;border-radius:8px;" />
      <div style="margin-left:10px;display:inline-block;vertical-align:top;">
        <div style="font-size:13px;color:#888;">성격유형별 공룡 테스트</div>
        <div id="shareTitle" style="font-weight:bold;"></div>
      </div>
    </div>
    <div class="share-btns">
      <button class="share-btn kakao" id="shareKakao">
        <img src="/img/icon/kakao.svg" alt="카카오톡 아이콘">카카오톡
      </button>
      <button class="share-btn facebook" id="shareFacebook">
        <img src="/img/icon/facebook.svg" alt="페이스북 아이콘">페이스북
      </button>
      <button class="share-btn x" id="shareX">
        <img src="/img/icon/x.svg" alt="X 아이콘">X
      </button>
      <button class="share-btn link" id="shareCopy">
        <img src="/img/icon/link.svg" alt="링크복사 아이콘">링크복사
      </button>
    </div>
  </div>
</div>

  <script src="script.js"></script>
  
</body>
</html>
