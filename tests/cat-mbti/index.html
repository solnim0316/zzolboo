<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고양이 MBTI 테스트</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="start">
    <h1>고양이 MBTI 테스트</h1>
    <p>너는 어떤 성격의 고양이일까? 🐾</p>
    <button id="startBtn">테스트 시작하기</button>
  </div>

  <div class="question" style="display:none;">
    <div class="progress"><div class="progress-bar"></div></div>
    <h3 id="qText"></h3>
    <ul id="optList"></ul>
  </div>

<div class="result" style="display:none;">
  <img id="rImg" />
  <h2 id="rTitle"></h2>
  <p id="rDesc"></p>
  <p id="rMatch"></p>
  <p id="rMismatch"></p>

  <button onclick="goHome()">처음으로</button>
  <button onclick="restartTest()">다시 하기</button>
  <button onclick="copyShareLink()">공유하기</button>
  <button onclick="downloadImage()">이미지 저장</button>
</div>
  <script src="script.js"></script>
  
</body>
</html>
